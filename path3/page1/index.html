<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PATH 3 - PAGE 1</title>
 
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background-color: #faf7f2;
            color: #4a4a4a;
            line-height: 1.7;
        }
 
        header {
            background: linear-gradient(120deg, #f6d365, #fda085);
            color: white;
            text-align: center;
            padding: 4rem 1rem;
        }
 
        header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
 
        header p {
            font-size: 1.2rem;
        }
 
        nav {
            background: white;
            padding: 0.8rem;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
 
        nav a {
            margin: 0 1rem;
            text-decoration: none;
            color: #f08a5d;
            font-weight: 600;
        }
 
        main {
            max-width: 1000px;
            margin: 2.5rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 2rem;
        }

 
        footer {
            margin-top: 3rem;
            background: #333;
            color: white;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
        }
 
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
        }
    </style>
