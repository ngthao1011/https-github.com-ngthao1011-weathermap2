<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fullscreen Image</title>
<style>
    /* Remove margins and make image fill screen */
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: black;
    }
    img {
        width: 100%;
        height: 100%;
        object-fit: contain; /* Keep aspect ratio */
        display: block;
    }
</style>
</head>
<body>

<!-- Your image -->
<img id="fullscreenImage" src="https://th.bing.com/th/id/OIP.AM3aZNJjsHMdoDHY7xz0UQHaFY?&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Fullscreen">

<script>
    // Request fullscreen when page loads
    window.onload = function () {
        const elem = document.documentElement; // Full page
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { // Safari
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { // IE/Edge
            elem.msRequestFullscreen();
        }
    };

    // Optional: Exit fullscreen on click
    document.getElementById("fullscreenImage").onclick = function () {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
        }
    };
</script>

</body>
</html>
